name: Continuous Integration for Python

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main


jobs:
  test:
    name: Test main package
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"
          - "3.14"
        os:
          - ubuntu-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Check out the code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # https://github.com/actions/checkout/releases/tag/v6.0.3

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # https://github.com/astral-sh/setup-uv/releases/tag/v8.1.0
        with:
          version: "latest"
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: make setup-ci

      - name: Static analysis
        run: make static

      - name: Run unit tests on codebase
        run: make test-unit
