name: Continuous Integration for Python

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main


jobs:
  test:
    name: Test main package
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"
          - "3.14"
        os:
          - ubuntu-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Check out the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2

      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # https://github.com/astral-sh/setup-uv/releases/tag/v8.2.0
        with:
          version: "latest"
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: make setup-ci

      - name: Static analysis
        run: make static

      - name: Run unit tests on codebase
        run: make test-unit
