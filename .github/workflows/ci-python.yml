name: Continuous Integration for Python

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main


jobs:
  test:
    name: Test main package
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"
          - "3.14"
        os:
          - ubuntu-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: make setup-ci

      - name: Static analysis on tests
        run: make lint
